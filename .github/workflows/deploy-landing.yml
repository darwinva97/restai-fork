name: Deploy Landing (Cloudflare Worker Static Assets)

# Despliega la landing Astro (apps/landing) como Cloudflare Workers Static Assets
# por CI/CD en cada push a main. Sirve el apex https://restai.bezenti.com.
# Reutiliza los secretos de Cloudflare ya configurados (sin nada propio).

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

jobs:
  deploy:
    name: Build (Astro) + deploy a Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - name: Build (Astro estático)
        working-directory: apps/landing
        run: bun run build
      - name: Deploy del Worker (Static Assets)
        working-directory: apps/landing
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
