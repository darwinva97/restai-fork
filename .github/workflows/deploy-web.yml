name: Deploy Web (Cloudflare Worker)

# Despliega el dashboard Next.js (apps/web) como Cloudflare Worker vía OpenNext,
# por CI/CD en cada push a main. Mismo patrón que la API (deploy-api.yml) y que
# otros proyectos Next del usuario en Cloudflare.
#
# Secretos del repo (Settings → Secrets and variables → Actions), ya usados por la API:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#
# El web se publica en https://app.restai.bezenti.com (ver apps/web/wrangler.jsonc);
# la API vive en https://restai.bezenti.com. NEXT_PUBLIC_API_URL se inyecta en build
# (es una var pública, se "hornea" en el bundle del cliente).

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build (OpenNext) + deploy a Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - name: Build (OpenNext para Cloudflare)
        working-directory: apps/web
        run: bun run cf:build
        env:
          NEXT_PUBLIC_API_URL: https://restai.bezenti.com
      - name: Deploy del Worker
        working-directory: apps/web
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
